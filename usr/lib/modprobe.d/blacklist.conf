# Blacklist the Intel TCO Watchdog/Timer module
blacklist iTCO_wdt

# Blacklist the AMD SP5100 TCO Watchdog/Timer module (Required for Ryzen cpus)
blacklist sp5100_tco

# Disable messy debug messages
blacklist evbug

# No beep
blacklist pcspkr

# Fix sound problems
blacklist snd_pcsp

# Prevent nouveau from conflicting with nvidia-open kernel modules
blacklist nouveau